version: "3.9"

# Local development stack.
# Exposes the same S3-compatible / SQL / tracking interfaces that production uses,
# so application code is identical in both environments.

services:

  # ---------------------------------------------------------------------------
  # Object storage (S3-compatible) — stores bronze / silver / gold Parquet
  # and MLflow model artefacts.
  # ---------------------------------------------------------------------------
  minio:
    image: quay.io/minio/minio:RELEASE.2024-03-15T01-07-19Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Creates the default bucket on first startup.
  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/pitwall-ai;
        echo 'Bucket pitwall-ai ready.';
      "

  # ---------------------------------------------------------------------------
  # PostgreSQL — backend store for MLflow tracking and Prefect metadata.
  # Two logical databases share one container for local simplicity.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pitwall
      POSTGRES_PASSWORD: pitwall
      POSTGRES_DB: mlflow          # Prefect uses a second DB created by init script
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitwall -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MLflow — experiment tracking + model registry.
  # Artefacts land in MinIO; metadata in Postgres.
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    command: >
      mlflow server
        --backend-store-uri postgresql://pitwall:pitwall@postgres:5432/mlflow
        --default-artifact-root s3://pitwall-ai/mlruns
        --host 0.0.0.0
        --port 5000
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Prefect — local workflow orchestration server.
  # ---------------------------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:2.19-python3.11
    command: prefect server start --host 0.0.0.0 --port 4200
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://pitwall:pitwall@postgres:5432/prefect
    volumes:
      - prefect-data:/root/.prefect
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  minio-data:
  postgres-data:
  prefect-data:
