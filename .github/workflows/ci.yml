name: CI

on:
  push:
    branches: [main, test_branch, "feat/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Lint & format check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # Type checking
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --all-extras
      - name: Type check
        run: uv run mypy services/ ml/

  # ---------------------------------------------------------------------------
  # Unit tests (no external services)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --all-extras
      - name: Run unit tests
        run: uv run pytest tests/unit tests/data_quality -v --cov=services --cov=ml --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Integration tests (MinIO + MLflow via docker-compose)
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    services:
      minio:
        image: quay.io/minio/minio:RELEASE.2024-03-15T01-07-19Z
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: pitwall
          POSTGRES_PASSWORD: pitwall
          POSTGRES_DB: mlflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --all-extras
      - name: Create MinIO bucket
        run: |
          pip install awscli-local
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
            aws --endpoint-url http://localhost:9000 s3 mb s3://pitwall-ai 2>/dev/null || true
      - name: Run integration tests
        env:
          PITWALL_MINIO_ENDPOINT: localhost:9000
          PITWALL_MINIO_ACCESS_KEY: minioadmin
          PITWALL_MINIO_SECRET_KEY: minioadmin
          PITWALL_MINIO_BUCKET: pitwall-ai
          PITWALL_MLFLOW_TRACKING_URI: http://localhost:5000
        run: uv run pytest tests/integration -v -m "not slow"
