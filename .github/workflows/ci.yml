name: CI

on:
  pull_request:
    branches: [main]
  # Run on main pushes only — feature branches rely on PR checks, avoiding
  # redundant CI (and Streamlit Cloud redeploy triggers) on every commit.
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Lint & format check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # Type checking
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --all-extras
      - name: Type check
        run: uv run mypy services/ ml/

  # ---------------------------------------------------------------------------
  # Unit tests (no external services)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --all-extras
      - name: Run unit tests
        run: uv run pytest tests/unit tests/data_quality -v --cov=services --cov=ml --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Integration tests (MinIO + MLflow via docker-compose)
  # TODO: add tests/integration/ when the ingestion + ML integration suite
  #       is ready. Requires MinIO (minio server /data) and a running MLflow
  #       instance. Run locally with: docker-compose up && pytest tests/integration
  # ---------------------------------------------------------------------------
