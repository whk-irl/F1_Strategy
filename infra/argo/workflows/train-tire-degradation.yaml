apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: train-tire-degradation
  namespace: pitwall
  labels:
    app: pitwall
    component: training
    model: tire-degradation
spec:
  entrypoint: train
  serviceAccountName: pitwall-training   # has an IRSA annotation for S3 + ECR access
  arguments:
    parameters:
      - name: image
        value: "REPLACE_WITH_ECR_URI/pitwall-tire-degradation:latest"
      - name: aws_region
        value: "us-east-1"
      - name: s3_bucket
        value: "pitwall-ai-prod"
      - name: mlflow_experiment
        value: "tire-degradation"
      - name: training_seasons
        value: "2021,2022,2023,2024"

  templates:
    - name: train
      inputs:
        parameters:
          - name: image
          - name: aws_region
          - name: s3_bucket
          - name: mlflow_experiment
          - name: training_seasons
      container:
        image: "{{inputs.parameters.image}}"
        imagePullPolicy: Always
        command: [python, -m, ml.models.tire_degradation.train]
        args:
          - "--seasons"
          - "{{inputs.parameters.training_seasons}}"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "8Gi"
            cpu: "4"
        env:
          - name: PITWALL_STORAGE_BACKEND
            value: s3
          - name: PITWALL_AWS_REGION
            value: "{{inputs.parameters.aws_region}}"
          - name: PITWALL_AWS_S3_BUCKET
            value: "{{inputs.parameters.s3_bucket}}"
          - name: PITWALL_MLFLOW_TRACKING_URI
            valueFrom:
              secretKeyRef:
                name: pitwall-secrets
                key: mlflow-tracking-uri
          - name: PITWALL_MLFLOW_EXPERIMENT_NAME
            value: "{{inputs.parameters.mlflow_experiment}}"
